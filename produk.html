<style>
.pd-back {
  display: inline-flex; align-items: center; gap: 7px;
  color: #475569; font-size: 13px; text-decoration: none;
  transition: color .2s; padding-top: 88px;
  max-width: 740px; margin: 0 auto; padding-left: 20px;
}
.pd-back:hover { color: #a855f7; }
.pd-wrap { max-width: 740px; margin: 0 auto; padding: 20px 20px 120px; }

.pd-hero {
  background: rgba(10,5,25,.85);
  border: 1px solid rgba(147,51,234,.18);
  border-radius: 16px; padding: 28px; margin-bottom: 28px;
  position: relative; overflow: hidden;
  display: flex; gap: 22px; align-items: flex-start;
}
.pd-hero::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(168,85,247,.55), transparent);
}
.pd-icon {
  width: 60px; height: 60px; flex-shrink: 0;
  border: 1px solid rgba(147,51,234,.22);
  border-radius: 14px;
  overflow: hidden;
}
.pd-hero-body { flex: 1; min-width: 0; }
.pd-name { font-size: clamp(17px,3.5vw,22px); font-weight: 800; color: #f1f5f9; line-height: 1.3; margin-bottom: 8px; }
.pd-tagline { font-size: 14px; color: #64748b; line-height: 1.7; margin-bottom: 20px; }
.pd-price-pill {
  display: inline-flex; align-items: center; gap: 12px;
  background: rgba(168,85,247,.08); border: 1px solid rgba(168,85,247,.22);
  border-radius: 10px; padding: 10px 18px;
}
.pd-price-lbl { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: .1em; }
.pd-price-val { font-size: 22px; font-weight: 800; color: #a855f7; }

.pd-sec { margin-bottom: 28px; }
.pd-sec-ttl {
  font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  color: #a855f7; margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.pd-sec-ttl::before { content: ''; width: 14px; height: 1px; background: #a855f7; flex-shrink: 0; }

.pd-about {
  font-size: 14px; color: #94a3b8; line-height: 1.85;
  background: rgba(147,51,234,.04); border: 1px solid rgba(147,51,234,.08);
  border-radius: 10px; padding: 18px 20px;
}

.pd-feat { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.pd-feat li {
  display: flex; align-items: flex-start; gap: 12px;
  font-size: 14px; color: #94a3b8; line-height: 1.6;
  padding: 12px 16px; background: rgba(10,5,25,.6);
  border: 1px solid rgba(147,51,234,.08); border-radius: 8px;
}
.pd-feat-check {
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(168,85,247,.12); border: 1px solid rgba(168,85,247,.25);
  display: flex; align-items: center; justify-content: center;
  color: #a855f7; font-size: 11px; font-weight: 700;
  flex-shrink: 0; margin-top: 1px;
}

.pd-includes { display: flex; flex-direction: column; gap: 8px; }
.pd-inc {
  display: flex; align-items: center; gap: 12px;
  font-size: 13px; color: #94a3b8; padding: 12px 16px;
  background: rgba(6,182,212,.04); border: 1px solid rgba(6,182,212,.1); border-radius: 8px;
}
.pd-inc-icon { font-size: 16px; flex-shrink: 0; }

.pd-note {
  background: rgba(245,158,11,.05); border: 1px solid rgba(245,158,11,.15);
  border-radius: 10px; padding: 14px 18px; margin-bottom: 28px;
  font-size: 13px; color: #78350f; line-height: 1.7;
  display: flex; gap: 10px;
}

/* Sticky CTA bar */
.pd-cta-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
  background: rgba(6,2,15,.95); backdrop-filter: blur(20px);
  border-top: 1px solid rgba(147,51,234,.15);
  padding: 14px 20px; display: flex; align-items: center;
  justify-content: space-between; gap: 16px;
}
.pd-cta-info .lbl { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: .08em; }
.pd-cta-info .val { font-size: 18px; font-weight: 800; color: #a855f7; line-height: 1.2; }
.pd-cta-bar .btn { white-space: nowrap; flex-shrink: 0; }
</style>

    note:'Tidak perlu coding sama sekali. Semua langkah dijelaskan secara bertahap, dari yang belum pernah menyentuh data historis sekalipun bisa mengikutinya.'},

    features:['Claude dilatih memahami kausalitas: kenapa A terjadi di area B, kenapa setelah X selalu muncul Y','Membaca anatomi pasar — di mana konsentrasi uang terbesar berada dan ke mana ia akan bergerak','Memahami psikologi pelaku pasar: apa yang diinginkan retail, institusi, dan algoritma pada waktu yang sama','1.000.000 data candle sebagai referensi — semakin banyak "pengalaman" yang dimiliki Claude','Panduan lengkap proses pelatihan dari awal hingga Claude siap digunakan untuk analisa nyata','Akses support 30 hari untuk memastikan proses pelatihan berjalan optimal'],

  '4':{name:'EA MT5 Trend Following',short:'EA MT5 Trend Following',icon:'🤖',img:'prod-ea.png',price:3000000,badge:'Premium',rating:4.8,sales:56,
    tagline:'Emosi adalah musuh terbesar trader. Bot tidak punya emosi. Bot tidak pernah FOMO.',
    about:'Salah satu alasan terbesar trader rugi bukan karena strategi yang buruk — tapi karena eksekusi yang tidak konsisten akibat emosi. EA MT5 Trend Following hadir untuk menyelesaikan masalah itu: bot ini membaca tren, masuk posisi sesuai parameter yang sudah kamu tentukan, dan keluar dengan disiplin yang tidak akan pernah bisa dipertahankan oleh manusia di jam 2 pagi. Sudah melalui backtesting dan pengujian live — bukan sekadar EA teoritis.',

  '5':{name:'Indikator TradingView XAU',short:'Indikator TradingView XAU',icon:'📊',img:'prod-indikator.png',price:750000,badge:null,rating:4.9,sales:91,
    tagline:'Gold bergerak di level-level tertentu yang tidak terlihat di chart biasa. Indikator ini menampilkannya.',
    about:'XAU/USD adalah pasangan yang digemari sekaligus ditakuti banyak trader — volatilitasnya tinggi, pergerakannya cepat, dan levelnya sering mengejutkan yang tidak tahu "peta"-nya. Indikator ini dirancang khusus untuk membantu trader XAU melihat area-area yang sering menjadi titik reaksi harga: level kritis yang diperhatikan oleh pemain besar, zona potensial reversal, dan konfirmasi arah sebelum entry. Dikembangkan dari pengalaman nyata trading XAU dan diperbarui secara berkelanjutan.',

const id = new URLSearchParams(location.search).get('id') || '1';
const p = PRODUCTS[id];

  const badge = p.badge ? `<span class="product-badge" style="position:static;font-size:11px;margin-bottom:10px;display:inline-block">${p.badge}</span><br>` : '';

    <div class="pd-hero">
      <div class="pd-icon"><img src="${p.img}" alt="${p.short}" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div class="pd-hero-body">
        ${badge}
        <div class="pd-name">${p.name}</div>
        <div class="pd-tagline">${p.tagline}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px">
          <span style="color:#f59e0b;font-size:13px;letter-spacing:.5px">★★★★★</span>
